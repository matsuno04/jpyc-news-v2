name: 週次自動更新

on:
  schedule:
    # 毎週月曜 09:00 JST = 00:00 UTC
    - cron: "0 0 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout jpyc-news-v2 (public)
        uses: actions/checkout@v4

      - name: Checkout jpyc-news-data (private)
        uses: actions/checkout@v4
        with:
          repository: matsuno04/jpyc-news-data
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: jpyc-news-data

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: 記事収集 (新規のみ、既存urlは自動スキップ)
        env:
          FULL_DATA_PATH: jpyc-news-data/raw_articles_full.csv
        run: python pipeline/collector.py

      - name: Haiku分類 (failedを先にリトライ、pendingを分類)
        env:
          FULL_DATA_PATH: jpyc-news-data/raw_articles_full.csv
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline/classifier.py

      - name: event_summary / daily_panel / 公開用raw_articles生成
        env:
          FULL_DATA_PATH: jpyc-news-data/raw_articles_full.csv
          PUBLIC_DATA_DIR: data
        run: python pipeline/panel_builder.py

      - name: 非公開リポジトリへコミット・プッシュ (本文データ)
        working-directory: jpyc-news-data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add raw_articles_full.csv
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "Weekly update: $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: 公開リポジトリへコミット・プッシュ (data/, docs/)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw_articles.csv data/event_summary.csv data/daily_panel.csv
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "Weekly update: $(date -u +%Y-%m-%d)"
            git push
          fi
